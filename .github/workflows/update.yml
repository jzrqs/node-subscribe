name: Update subscriptions

on:
  schedule:
    - cron: "30 1 * * *"
    - cron: "30 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Update subscriptions
        run: |
          python update.py

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add v2ray.txt v2ray_plain.txt clash.yaml singbox.json source.json
          git commit -m "Update subscriptions" || echo "No changes"
          git push
